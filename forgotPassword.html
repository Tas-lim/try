<!DOCTYPE html>
<html lang="en" data-static-site="true">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SILM</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
<header class="header">
    <div class="container nav">
        <a href="index.html" class="logo-link" aria-label="Silm home">
            <h2 class="logo">Silm</h2>
        </a>

        <button class="hamburger" aria-label="Menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" class="nav-auth">Login</a></li>
                <li><a href="account.html" class="nav-auth nav-auth-primary">Create Account</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="overlay"></div>

<main>
    <div class="container auth-container">
        <div class="card auth-card">
            <h2 class="card-title">Forgot Password</h2>

            <form method="POST" class="form" data-static-form="forgot">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label><br>
                    <input type="email" name="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <button type="submit" class="btn btn-primary">Create Reset Link</button>
                <p class="form-message" aria-live="polite"></p>
            </form>

            <p class="auth-footer">
                Remembered your password? <a href="login.html">Login</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
